# 控制点示例文件
# 格式: lon/lat (WGS84经纬度) -> col/row (图像像素坐标)
#
# 如何创建控制点:
# 1. 在地图图像上识别一个容易定位的点(岛屿、海岸线拐点等)
# 2. 读取该点在图像中的像素坐标 (col, row)
# 3. 根据经纬度信息确定该点的实际经纬度 (lon, lat)
# 4. 将 (lon, lat, col, row) 添加到列表中
#
# 注意: col是图像列号(水平方向), row是图像行号(垂直方向, 从上往下递增)
# 注意: 地图使用 y-down 坐标, row=0 是图像顶部, row=height-1 是图像底部

control_points:
  # 四个角点 (基于轨迹范围和当前线性映射的近似值)
  - lon: 120.40344
    lat: 31.98967
    col: 0
    row: 81
    description: "轨迹区域西南角"

  - lon: 120.65603
    lat: 31.98967
    col: 179
    row: 81
    description: "轨迹区域东南角"

  - lon: 120.40344
    lat: 32.07567
    col: 0
    row: 5
    description: "轨迹区域西北角"

  - lon: 120.65603
    lat: 32.07567
    col: 179
    row: 5
    description: "轨迹区域东北角"

  # 中心区域控制点
  - lon: 120.53000
    lat: 32.03000
    col: 90
    row: 43
    description: "轨迹区域中心"

  # 边缘控制点 (帮助修正仿射变换的倾斜)
  - lon: 120.41470
    lat: 32.03000
    col: 0
    row: 43
    description: "西边缘中点"

  - lon: 120.64470
    lat: 32.03000
    col: 179
    row: 43
    description: "东边缘中点"
